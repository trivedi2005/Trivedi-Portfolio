<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivedi - Ultimate Interactive Portfolio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; transition: background-color 0.5s ease, color 0.5s ease; }
        
        :root {
            --bg-gradient: linear-gradient(-45deg, #090d16, #1e1b4b, #2e1065, #042f2e, #090d16);
            --container-bg: rgba(15, 23, 42, 0.65);
            --text-main: #f8fafc;
            --text-sub: #cbd5e1;
            --card-bg: rgba(30, 41, 59, 0.4);
            --card-hover-bg: rgba(30, 41, 59, 0.7);
            --border-glow: rgba(255, 255, 255, 0.08);
            --modal-bg: rgba(15, 23, 42, 0.9);
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(-45deg, #f0fdf4, #e0f2fe, #f3e8ff, #fef2f2, #f0fdf4);
            --container-bg: rgba(255, 255, 255, 0.75);
            --text-main: #0f172a;
            --text-sub: #334155;
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-hover-bg: rgba(255, 255, 255, 0.9);
            --border-glow: rgba(15, 23, 42, 0.08);
            --modal-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientMove 12s infinite alternate ease-in-out;
            color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .portfolio-container {
            max-width: 1100px;
            width: 100%;
            background: var(--container-bg); 
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-top: 3px solid #d946ef; 
            border-radius: 24px;
            padding: 30px;
        }

        /* FIXED RESPONSIVE HEADER */
        .profile-header-grid {
            display: flex;
            align-items: center;
            gap: 35px;
            margin-bottom: 40px;
            flex-wrap: wrap; /* Allows stacking on mobile */
        }

        @media (max-width: 768px) {
            .profile-header-grid { justify-content: center; text-align: center; }
            h1 { font-size: 28px !important; }
        }

        .profile-image-container {
            width: 150px; height: 150px; flex-shrink: 0;
        }

        .profile-img {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover; border: 4px solid #38bdf8;
        }

        /* Other UI elements remain same */
        h1 { font-size: 42px; font-weight: 800; margin-bottom: 8px; }
        .typing-subtitle { font-size: 19px; color: #38bdf8; min-height: 26px; }
        .about-text { font-size: 17px; color: var(--text-sub); line-height: 1.6; margin-top: 10px; }
        
        .skills-grid, .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .theme-toggle { position: fixed; top: 20px; right: 20px; z-index: 1000; padding: 10px; border-radius: 20px; cursor: pointer; }

        @keyframes gradientMove { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
    </style>
</head>
<body data-theme="dark">

<button class="theme-toggle" id="themeBtn">🌓 Switch</button>

<div class="portfolio-container">
    <div class="profile-header-grid">
        <div class="profile-image-container">
            <img src="profile.jpg" alt="Battula Ramana Trivedi" class="profile-img">
        </div>
        <div class="profile-text-area">
            <h1>Battula Ramana Trivedi</h1>
            <div class="typing-subtitle" id="typewriter"></div>
            <p class="about-text">I am a B.Tech graduate(2026) specializing in engineering technical software solutions. I focus heavily on Java development and SQL-based data analytics.</p>
        </div>
    </div>

    </div>

<script>
    const themeBtn = document.getElementById('themeBtn');
    themeBtn.addEventListener('click', () => {
        const newTheme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', newTheme);
    });
    
    // Typewriter effect
    const words = ["Java Developer", "SQL & Data Analyst", "B.Tech Graduate"];
    let wordIdx = 0, charIdx = 0, isDeleting = false;
    const txtElement = document.getElementById('typewriter');
    const typeAnimation = () => {
        const currentWord = words[wordIdx];
        txtElement.textContent = isDeleting ? currentWord.substring(0, charIdx - 1) : currentWord.substring(0, charIdx + 1);
        charIdx = isDeleting ? charIdx - 1 : charIdx + 1;
        let typeSpeed = isDeleting ? 40 : 80;
        if (!isDeleting && charIdx === currentWord.length) { typeSpeed = 1500; isDeleting = true; }
        else if (isDeleting && charIdx === 0) { isDeleting = false; wordIdx = (wordIdx + 1) % words.length; }
        setTimeout(typeAnimation, typeSpeed);
    };
    typeAnimation();
</script>
</body>
</html>
